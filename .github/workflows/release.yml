name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: android/**/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          body: |
            ## AI-AGENT ${{ github.ref_name }}

            ### Download
            - **Android APK** – download `app-debug.apk` from the assets below and install on any Android device (minSdk 26 / Android 8.0+).
            - **Browser** – run the backend with Docker:
              ```bash
              docker compose up
              ```
              Then open http://localhost:8000/ui in your browser.
