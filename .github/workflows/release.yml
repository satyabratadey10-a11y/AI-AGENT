name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: android/**/build/outputs/apk/debug/*.apk
          generate_release_notes: true
          body: |
            ## AI-AGENT ${{ github.ref_name }}

            ### Download
            - **Android APK** – download `app-debug.apk` from the assets below and install on any Android device (minSdk 26 / Android 8.0+).
            - **Browser** – run the backend with Docker:
              ```bash
              docker compose up
              ```
              Then open http://localhost:8000/ui in your browser.
